<!DOCTYPE html>
<html><head><title>RISE Icon Generator</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:40px">
<h1>RISE Icon Generator</h1>
<p>Click each button to download the icon. Place them in /icons/ folder.</p>
<div id="output" style="display:flex;flex-wrap:wrap;gap:20px;margin-top:20px"></div>
<script>
[72,96,128,144,152,192,384,512,1024].forEach(function(size){
  var c=document.createElement('canvas');c.width=size;c.height=size;var ctx=c.getContext('2d');
  var r=size*.18;ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(size-r,0);ctx.quadraticCurveTo(size,0,size,r);ctx.lineTo(size,size-r);ctx.quadraticCurveTo(size,size,size-r,size);ctx.lineTo(r,size);ctx.quadraticCurveTo(0,size,0,size-r);ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();ctx.fillStyle='#07080a';ctx.fill();ctx.strokeStyle='#d4aa4a';ctx.lineWidth=size*.02;ctx.stroke();
  var g=ctx.createLinearGradient(size*.3,size*.2,size*.7,size*.8);g.addColorStop(0,'#d4aa4a');g.addColorStop(1,'#e8c86a');
  ctx.font='800 '+size*.52+'px Arial Black,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=g;ctx.fillText('R',size/2,size/2+size*.02);
  var d=document.createElement('div');d.style.textAlign='center';d.innerHTML='<div>'+size+'x'+size+'</div>';d.appendChild(c);
  var b=document.createElement('button');b.textContent='Download';b.style.cssText='display:block;margin:8px auto;padding:6px 16px;background:#d4aa4a;color:#07080a;border:none;border-radius:6px;cursor:pointer;font-weight:700';
  b.onclick=function(){var a=document.createElement('a');a.download='icon-'+size+'.png';a.href=c.toDataURL('image/png');a.click()};
  d.appendChild(b);document.getElementById('output').appendChild(d);
});
</script>
</body></html>
