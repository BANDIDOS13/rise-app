<!DOCTYPE html>
<html><head><title>FORGE Asset Generator</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:40px">
<h1 style="color:#d4aa4a">FORGE Asset Generator</h1>
<p>Generate all icons and OG image. Click to download each.</p>

<h2 style="margin-top:30px;color:#d4aa4a">App Icons (PNG)</h2>
<div id="icons" style="display:flex;flex-wrap:wrap;gap:20px;margin-top:12px"></div>

<h2 style="margin-top:30px;color:#d4aa4a">OG Image (1200x630)</h2>
<div id="og" style="margin-top:12px"></div>

<script>
// ── ICON GENERATION ──
[192,512].forEach(function(size){
  var c=document.createElement('canvas');c.width=size;c.height=size;var ctx=c.getContext('2d');
  var r=size*.18;ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(size-r,0);ctx.quadraticCurveTo(size,0,size,r);ctx.lineTo(size,size-r);ctx.quadraticCurveTo(size,size,size-r,size);ctx.lineTo(r,size);ctx.quadraticCurveTo(0,size,0,size-r);ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();ctx.fillStyle='#07080a';ctx.fill();
  // Gold border
  ctx.strokeStyle='#d4aa4a';ctx.lineWidth=size*.015;ctx.stroke();
  // Subtle glow
  var glow=ctx.createRadialGradient(size/2,size*.4,0,size/2,size/2,size*.5);
  glow.addColorStop(0,'rgba(212,170,74,0.08)');glow.addColorStop(1,'transparent');
  ctx.fillStyle=glow;ctx.fill();
  // Letter F
  var g=ctx.createLinearGradient(size*.3,size*.2,size*.7,size*.8);g.addColorStop(0,'#d4aa4a');g.addColorStop(1,'#e8c86a');
  ctx.font='800 '+size*.52+'px "Arial Black",system-ui,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle=g;ctx.fillText('F',size/2,size/2+size*.02);

  var d=document.createElement('div');d.style.textAlign='center';
  d.innerHTML='<div style="margin-bottom:4px">'+size+'x'+size+'</div>';
  c.style.cssText='width:'+Math.min(size,200)+'px;height:'+Math.min(size,200)+'px;border-radius:20%';
  d.appendChild(c);
  var b=document.createElement('button');b.textContent='Download PNG';b.style.cssText='display:block;margin:8px auto;padding:8px 20px;background:#d4aa4a;color:#07080a;border:none;border-radius:6px;cursor:pointer;font-weight:700';
  b.onclick=function(){var a=document.createElement('a');a.download='manifest-icon-'+size+'.png';a.href=c.toDataURL('image/png');a.click()};
  d.appendChild(b);document.getElementById('icons').appendChild(d);
});

// ── OG IMAGE GENERATION ──
(function(){
  var c=document.createElement('canvas');c.width=1200;c.height=630;var ctx=c.getContext('2d');

  // Background
  var bg=ctx.createLinearGradient(0,0,1200,630);
  bg.addColorStop(0,'#07080a');bg.addColorStop(1,'#0c0e11');
  ctx.fillStyle=bg;ctx.fillRect(0,0,1200,630);

  // Glow
  var glow=ctx.createRadialGradient(600,250,0,600,300,400);
  glow.addColorStop(0,'rgba(212,170,74,0.1)');glow.addColorStop(1,'transparent');
  ctx.fillStyle=glow;ctx.fillRect(0,0,1200,630);

  // Top gold line
  var topG=ctx.createLinearGradient(0,0,1200,0);
  topG.addColorStop(0,'#d4aa4a');topG.addColorStop(0.5,'#f0d878');topG.addColorStop(1,'#d4aa4a');
  ctx.fillStyle=topG;ctx.fillRect(0,0,1200,5);

  // FORGE title
  var gold=ctx.createLinearGradient(400,200,800,280);
  gold.addColorStop(0,'#d4aa4a');gold.addColorStop(1,'#e8c86a');
  ctx.fillStyle=gold;ctx.font='900 100px "Arial Black",system-ui,sans-serif';ctx.textAlign='center';
  ctx.letterSpacing='12px';ctx.fillText('FORGE',600,260);

  // Tagline
  ctx.fillStyle='#8a9099';ctx.font='500 28px system-ui,sans-serif';
  ctx.fillText('Forge ta meilleure version. 1% chaque jour.',600,330);

  // Feature pills
  var pills=[
    {text:'🤖 Mentor IA',col:'#d4aa4a'},
    {text:'🎮 Gamification',col:'#4db87a'},
    {text:'📚 12 Formations',col:'#4a9ed4'},
    {text:'🌿 30+ Outils',col:'#8b6de0'},
  ];
  var startX=300;
  pills.forEach(function(p,i){
    var x=startX+i*165;
    ctx.strokeStyle=p.col;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(x-55,395,130,36,8);ctx.stroke();
    ctx.fillStyle=p.col;ctx.font='700 14px system-ui,sans-serif';ctx.textAlign='center';
    ctx.fillText(p.text,x+10,418);
  });

  // Footer line
  ctx.strokeStyle='#1e252e';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(100,560);ctx.lineTo(1100,560);ctx.stroke();

  // Footer text
  ctx.fillStyle='#424b57';ctx.font='600 15px system-ui,sans-serif';ctx.textAlign='center';
  ctx.fillText('forge-app.com — Gratuit pour toujours',600,590);

  c.style.cssText='width:600px;height:315px;border:1px solid #333;border-radius:8px';
  var d=document.createElement('div');d.appendChild(c);
  var b=document.createElement('button');b.textContent='Download OG Image (PNG)';
  b.style.cssText='display:block;margin:12px 0;padding:10px 24px;background:#d4aa4a;color:#07080a;border:none;border-radius:6px;cursor:pointer;font-weight:700;font-size:14px';
  b.onclick=function(){var a=document.createElement('a');a.download='og-image.png';a.href=c.toDataURL('image/png');a.click()};
  d.appendChild(b);document.getElementById('og').appendChild(d);
})();
</script>
</body></html>
