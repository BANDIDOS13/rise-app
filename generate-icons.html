<!DOCTYPE html>
<html>
<head><title>RISE Icon Generator</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:40px">
<h1>RISE Icon Generator</h1>
<p>Click each button to download the icon. Place them in /icons/ folder.</p>
<div id="output" style="display:flex;flex-wrap:wrap;gap:20px;margin-top:20px"></div>
<script>
const sizes = [72, 96, 128, 144, 152, 192, 384, 512, 1024];
const container = document.getElementById('output');

sizes.forEach(size => {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Background with rounded corners
  const r = size * 0.18;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#07080a';
  ctx.fill();

  // Gold gradient border
  ctx.strokeStyle = '#d4aa4a';
  ctx.lineWidth = size * 0.02;
  ctx.stroke();

  // "R" letter
  const fontSize = size * 0.52;
  ctx.font = `800 ${fontSize}px 'Arial Black', sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Gold gradient for text
  const grad = ctx.createLinearGradient(size*0.3, size*0.2, size*0.7, size*0.8);
  grad.addColorStop(0, '#d4aa4a');
  grad.addColorStop(1, '#e8c86a');
  ctx.fillStyle = grad;
  ctx.fillText('R', size/2, size/2 + size*0.02);

  // Subtle glow
  ctx.shadowColor = 'rgba(212,170,74,0.3)';
  ctx.shadowBlur = size * 0.08;
  ctx.fillText('R', size/2, size/2 + size*0.02);

  const div = document.createElement('div');
  div.style.textAlign = 'center';
  div.innerHTML = `<div style="margin-bottom:8px">${size}x${size}</div>`;
  div.appendChild(canvas);

  const btn = document.createElement('button');
  btn.textContent = 'Download';
  btn.style.cssText = 'display:block;margin:8px auto;padding:6px 16px;background:#d4aa4a;color:#07080a;border:none;border-radius:6px;cursor:pointer;font-weight:700';
  btn.onclick = () => {
    const a = document.createElement('a');
    a.download = `icon-${size}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  };
  div.appendChild(btn);
  container.appendChild(div);
});
</script>
</body>
</html>
